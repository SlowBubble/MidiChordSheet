<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, user-scalable=no">
  <title>Piano Comping</title>
  <link rel="stylesheet" href="../appPlay/play.css">
  <style>
    .status { font-size: 1.1rem; color: #000; background: none; }
  </style>
  <script src="../lib/midi.js/inc/shim/Base64.js"></script>
  <script src="../lib/midi.js/inc/shim/Base64binary.js"></script>
  <script src="../lib/midi.js/inc/shim/WebAudioAPI.js"></script>
  <script src="../lib/midi.js/js/midi/audioDetect.js"></script>
  <script src="../lib/midi.js/js/midi/gm.js"></script>
  <script src="../lib/midi.js/js/midi/loader.js"></script>
  <script src="../lib/midi.js/js/midi/plugin.audiotag.js"></script>
  <script src="../lib/midi.js/js/midi/plugin.webaudio.js"></script>
  <script src="../lib/midi.js/js/midi/plugin.webmidi.js"></script>
  <script src="../lib/midi.js/js/util/dom_request_xhr.js"></script>
  <script src="../lib/midi.js/js/util/dom_request_script.js"></script>
  <script src="../lib/abcjs-basic.js"></script>
  <script type="module" src="compingMain.js"></script>
</head>
<body>
  <div id="container">
    <div id="main">
      <p id="status" class="status">🔴 Press Space to start audio</p>
      <p id="beat-display" style="font-size:4rem; font-weight:bold; letter-spacing:0.8em;"></p>
      <div id="sheet-display" style="margin-top:1em;"></div>
    </div>
    <div id="menu">
      <table id="menu-table">
        <tr>
          <td>Beats/measure</td>
          <td id="beats-display">4</td>
          <td>
            <div><button id="incr-beats-btn">▲</button></div>
            <div><button id="decr-beats-btn">▼</button></div>
          </td>
        </tr>
        <tr>
          <td>Subdivision</td>
          <td id="subdiv-display">1</td>
          <td>
            <div><button id="incr-subdiv-btn">▲</button></div>
            <div><button id="decr-subdiv-btn">▼</button></div>
          </td>
        </tr>
        <tr>
          <td>Low note threshold</td>
          <td id="threshold-display">D4</td>
          <td>
            <div><button id="incr-threshold-btn">▲</button></div>
            <div><button id="decr-threshold-btn">▼</button></div>
          </td>
        </tr>
        <tr>
          <td>Idle measures to stop</td>
          <td id="idle-measures-display">1</td>
          <td>
            <div><button id="incr-idle-btn">▲</button></div>
            <div><button id="decr-idle-btn">▼</button></div>
          </td>
        </tr>
        <tr>
          <td>Note End Quanta</td>
          <td id="note-length-display">1/4</td>
          <td>
            <div><button id="incr-note-length-btn">▲</button></div>
            <div><button id="decr-note-length-btn">▼</button></div>
          </td>
        </tr>
        <tr>
          <td colspan="3">
            <label>
              <input type="checkbox" id="silent-til-double-bass-cb">
              Silent Til Double Bass
            </label>
          </td>
        </tr>
        <tr>
          <td colspan="3">
            <label>
              <input type="checkbox" id="mute-if-double-soprano-cb">
              Mute If Double Soprano
            </label>
          </td>
        </tr>
      </table>
    </div>
  </div>
</body>
</html>
